services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atmbank
      POSTGRES_USER: atm
      POSTGRES_PASSWORD: atm
    ports:
      - "5432:5432"
    volumes:
      - atm_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atm -d atmbank"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./server
    environment:
      DB_URL: jdbc:postgresql://db:5432/atmbank
      DB_USERNAME: atm
      DB_PASSWORD: atm
      JWT_SECRET: change-me-in-production-please-32-bytes-minimum
      CORS_ORIGINS: http://localhost:5173,http://localhost
      USERS_FILE: /app/data/users.csv
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - atm_userdata:/app/data

  frontend:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  atm_db:
  atm_userdata:
